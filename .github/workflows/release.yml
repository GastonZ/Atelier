name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: build · publish (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset: dragon_atelier-windows-amd64.exe
          - goos: linux
            goarch: amd64
            asset: dragon_atelier-linux-amd64
          - goos: darwin
            goarch: arm64
            asset: dragon_atelier-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w -X github.com/gastonz/atelier/internal/version.Version=${{ github.ref_name }}" -o "${{ matrix.asset }}" ./cmd/atelier

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
