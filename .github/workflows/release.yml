name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# A single job builds every target and uploads once. (A matrix of jobs each
# calling action-gh-release races to CREATE the release — the losers fail with
# "already_exists", which dropped the darwin asset from v0.4.0.)
jobs:
  release:
    name: build · publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build all targets
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/gastonz/atelier/internal/version.Version=${GITHUB_REF_NAME}"
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o dist/dragon_atelier-windows-amd64.exe ./cmd/atelier
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o dist/dragon_atelier-linux-amd64 ./cmd/atelier
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags "$LDFLAGS" -o dist/dragon_atelier-darwin-arm64 ./cmd/atelier

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
